name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Test
        run: go test ./...

  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goarch: [arm, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build
        env:
          GOARCH: ${{ matrix.goarch }}
          GOARM: "7"
        run: go build ./cmd/...
